<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Staff - 專業五線譜全組合</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --primary: #00E676; --accent: #FFD600; --bg: #121212; --text: #eee; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* 頂部控制 */
        .controls { background: #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        #playBtn { background: var(--primary); color: #000; }
        #randomBtn { background: #444; color: white; }

        /* 五線譜設計 */
        .staff-scroll-container {
            width: 100%;
            overflow-x: auto;
            background: #fff;
            border-radius: 8px;
            white-space: nowrap;
            display: flex;
            align-items: center;
        }

        /* 譜號與拍號 (固定在最左邊) */
        .staff-header {
            background: #fff;
            padding: 0 10px;
            height: 120px;
            display: flex;
            align-items: center;
            font-family: serif;
            font-size: 2.5rem;
            border-right: 2px solid #000;
            position: sticky;
            left: 0;
            z-index: 10;
            /* 繪製背景線條 */
            background-image: linear-gradient(#000 1px, transparent 1px);
            background-size: 100% 8px;
            background-repeat: repeat-x;
            background-position: 0 45px;
        }

        .staff-wrapper {
            display: inline-flex;
            height: 120px;
            background-image: linear-gradient(#000 1px, transparent 1px);
            background-size: 100% 8px;
            background-repeat: repeat-x;
            background-position: 0 45px;
        }

        .staff-beat {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            width: 140px;
            border-right: 1px solid #eee;
            position: relative;
            transition: background 0.1s;
        }

        .staff-note-view {
            font-size: 3.2rem;
            height: 80px;
            line-height: 85px; /* 調整讓符頭壓線 */
            color: #000;
            font-family: serif;
            margin-top: 5px;
        }

        /* 播放狀態 */
        .staff-beat.active { background-color: rgba(0, 230, 118, 0.2); }
        .staff-beat.is-first { border-left: 2px solid #000; }

        select { 
            background: #eee; color: #000; border: 1px solid #ccc; 
            font-size: 10px; width: 90%; padding: 3px; border-radius: 4px; margin-bottom: 5px;
        }
        .label { font-size: 9px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

<div class="controls">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>BPM <input type="number" id="bpm" value="80" style="width:50px;"></span>
        <label><input type="checkbox" id="bgDrum" checked> 背景8分</label>
    </div>
    <div class="btn-group">
        <button id="randomBtn">隨機組合</button>
        <button id="playBtn">START</button>
    </div>
</div>

<div id="mainScroll" class="staff-scroll-container">
    <div class="staff-header">
        <div>∮<br><small style="font-size:1.2rem; display:block; margin-top:-10px;"><b>4<br>4</b></small></div>
    </div>
    <div id="staffWrapper" class="staff-wrapper"></div>
</div>

<script>
    const mainSynth = new Tone.MembraneSynth().toDestination();
    const hihat = new Tone.MetalSynth({ envelope: { decay: 0.05 }, volume: -25 }).toDestination();

    // 把剛才消失的 16 分組合通通抓回來！
    const patterns = [
        { id: '4n', name: '四分音符 (1)', icon: '♩', notes: ['4n'] },
        { id: '8n2', name: '八分x2 (1-3)', icon: '♫', notes: ['8n', '8n'] },
        { id: '16n4', name: '16分x4 (1-2-3-4)', icon: '♬♬', notes: ['16n', '16n', '16n', '16n'] },
        // 切分與組合
        { id: '16_16_8', name: '前快後慢 (1-2-3)', icon: '♬𝅘𝅥𝅮', notes: ['16n', '16n', '8n'] },
        { id: '8_16_16', name: '前慢後快 (1-3-4)', icon: '𝅘𝅥𝅮♬', notes: ['8n', '16n', '16n'] },
        { id: '16_8_16', name: '中切分 (1-2-4)', icon: '𝅘𝅥𝅮𝅘𝅥𝅘𝅥𝅮', notes: ['16n', '8n', '16n'] },
        // 附點
        { id: 'dot8_16', name: '前附點 (1...4)', icon: '♩.𝅘𝅥𝅮', notes: ['8n.', '16n'] },
        { id: '16_dot8', name: '後附點 (1-2...)', icon: '𝅘𝅥𝅮.♩', notes: ['16n', '8n.'] },
        // 單點挑戰
        { id: '16_2', name: '只打第2點', icon: '·𝅘𝅥𝅮··', notes: [null, '16n', '16n', '8n'] },
        { id: '16_4', name: '只打第4點', icon: '···𝅘𝅥𝅮', notes: ['8n', '16n', '16n'] },
        // 特殊
        { id: '3t', name: '三連音', icon: '𝅘𝅥𝅮𝅘𝅥𝅮𝅘𝅥𝅮', notes: ['8t', '8t', '8t'] },
        { id: 'rest', name: '全拍休止', icon: '𝄽', notes: [] }
    ];

    let isPlaying = false;
    const wrapper = document.getElementById('staffWrapper');

    for (let i = 0; i < 8; i++) {
        const beat = document.createElement('div');
        beat.className = 'staff-beat' + (i % 4 === 0 ? ' is-first' : '');
        beat.id = `beat-${i}`;
        beat.innerHTML = `<div class="label">${i===0?'拍1':'拍'+(i+1)}</div><div class="staff-note-view" id="view-${i}"></div><select id="sel-${i}"></select>`;
        wrapper.appendChild(beat);
        const sel = document.getElementById(`sel-${i}`);
        patterns.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id; opt.innerText = p.name; sel.appendChild(opt);
        });
        sel.onchange = () => updateView(i);
    }

    function updateView(index) {
        const p = patterns.find(x => x.id === document.getElementById(`sel-${index}`).value);
        document.getElementById(`view-${index}`).innerText = p.icon;
    }

    document.getElementById('randomBtn').onclick = () => {
        for (let i = 0; i < 8; i++) {
            document.getElementById(`sel-${i}`).value = patterns[Math.floor(Math.random() * patterns.length)].id;
            updateView(i);
        }
    };

    async function togglePlay() {
        await Tone.start();
        if (isPlaying) {
            Tone.Transport.stop(); Tone.Transport.cancel();
            document.querySelectorAll('.staff-beat').forEach(b => b.classList.remove('active'));
            document.getElementById('playBtn').innerText = "START";
            isPlaying = false;
        } else {
            Tone.Transport.bpm.value = document.getElementById('bpm').value;
            let timeCursor = 0;
            for (let i = 0; i < 8; i++) {
                const p = patterns.find(x => x.id === document.getElementById(`sel-${i}`).value);
                const start = timeCursor;
                const pitch = (i === 0) ? "C3" : "C2";

                Tone.Transport.schedule((time) => {
                    Tone.Draw.schedule(() => {
                        document.querySelectorAll('.staff-beat').forEach(b => b.classList.remove('active'));
                        document.getElementById(`beat-${i}`).classList.add('active');
                        document.getElementById('mainScroll').scrollTo({ left: i * 140, behavior: 'smooth' });
                    }, time);
                }, start);

                if (document.getElementById('bgDrum').checked) {
                    Tone.Transport.schedule((t) => hihat.triggerAttackRelease("32n", t), start);
                    Tone.Transport.schedule((t) => hihat.triggerAttackRelease("32n", t), start + Tone.Time('8n').toSeconds());
                }

                if (p.id === 'rest') {
                    timeCursor += Tone.Time('4n').toSeconds();
                } else if (p.id === '16_2') {
                    timeCursor += Tone.Time('16n').toSeconds();
                    Tone.Transport.schedule((t) => mainSynth.triggerAttackRelease(pitch, "32n", t), timeCursor);
                    timeCursor += Tone.Time('8n.').toSeconds();
                } else if (p.id === '16_4') {
                    timeCursor += Tone.Time('8n.').toSeconds();
                    Tone.Transport.schedule((t) => mainSynth.triggerAttackRelease(pitch, "32n", t), timeCursor);
                    timeCursor += Tone.Time('16n').toSeconds();
                } else {
                    p.notes.forEach((n, idx) => {
                        Tone.Transport.schedule((t) => mainSynth.triggerAttackRelease((idx===0?pitch:"C2"), "32n", t), timeCursor);
                        timeCursor += Tone.Time(n).toSeconds();
                    });
                }
            }
            Tone.Transport.loop = true; Tone.Transport.loopEnd = timeCursor; Tone.Transport.start();
            document.getElementById('playBtn').innerText = "STOP";
            isPlaying = true;
        }
    }

    document.getElementById('playBtn').onclick = togglePlay;
    document.getElementById('randomBtn').click();
</script>
</body>
</html>
