<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rhythm Staff - 16分音符全能練習</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --primary: #00E676; --accent: #FFD600; --bg: #121212; --text: #eee; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; overflow-x: hidden; }
        
        .controls { background: #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        #playBtn { background: var(--primary); color: #000; }
        #randomBtn { background: #444; color: white; }

        .staff-scroll-container {
            width: 100%; overflow-x: auto; background: #fff; border-radius: 8px;
            white-space: nowrap; display: flex; align-items: center;
        }

        .staff-header {
            background: #fff; padding: 0 10px; height: 110px; display: flex; align-items: center;
            font-family: serif; font-size: 2.2rem; border-right: 2px solid #000; position: sticky; left: 0; z-index: 10;
            background-image: linear-gradient(#000 1px, transparent 1px); background-size: 100% 8px; background-position: 0 40px;
        }

        .staff-wrapper {
            display: inline-flex; height: 110px;
            background-image: linear-gradient(#000 1px, transparent 1px); background-size: 100% 8px; background-position: 0 40px;
        }

        .staff-beat {
            display: inline-flex; flex-direction: column; align-items: center; width: 130px;
            border-right: 1px solid #eee; position: relative; transition: 0.1s;
        }

        .staff-note-view { font-size: 3rem; height: 75px; line-height: 75px; color: #000; font-family: serif; margin-top: 5px; }
        .staff-beat.active { background-color: rgba(0, 230, 118, 0.2); }
        .staff-beat.is-first { border-left: 2px solid #000; }

        select { background: #eee; color: #000; border: 1px solid #ccc; font-size: 10px; width: 90%; padding: 3px; border-radius: 4px; }
        .label { font-size: 9px; color: #999; margin-top: 5px; }
    </style>
</head>
<body>

<div class="controls">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span>BPM <input type="number" id="bpm" value="75" style="width:50px;"></span>
        <label><input type="checkbox" id="bgDrum" checked> 背景8分</label>
    </div>
    <div class="btn-group">
        <button id="randomBtn">隨機組合</button>
        <button id="playBtn">START</button>
    </div>
</div>

<div id="mainScroll" class="staff-scroll-container">
    <div class="staff-header">∮<br><small><b>4<br>4</b></small></div>
    <div id="staffWrapper" class="staff-wrapper"></div>
</div>
